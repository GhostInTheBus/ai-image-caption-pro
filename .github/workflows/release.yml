name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ExifTool
        run: brew install exiftool && cp $(which exiftool) bin/exiftool

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build app
        run: bash build_mac.sh

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: AI-Image-Caption-Pro-mac
          path: AI-Image-Caption-Pro-mac.dmg
          if-no-files-found: warn

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libimage-exiftool-perl libxcb-xinerama0 \
            libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-randr0 \
            libxcb-render-util0 libxkbcommon-x11-0 libegl1
          cp $(which exiftool) bin/exiftool

      - name: Install Python dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build binary
        run: bash build_linux.sh

      - name: Tar the dist folder
        run: tar -czf AI-Image-Caption-Pro-linux.tar.gz -C dist AIImageCaptionPro

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: AI-Image-Caption-Pro-linux
          path: AI-Image-Caption-Pro-linux.tar.gz

  release:
    needs: [build-macos, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            AI-Image-Caption-Pro-mac.dmg
            AI-Image-Caption-Pro-linux.tar.gz
          generate_release_notes: true
