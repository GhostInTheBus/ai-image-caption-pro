<svg viewBox="0 0 900 560" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
  <!-- Window chrome -->
  <rect width="900" height="560" rx="10" fill="#1e1e2e"/>
  <rect width="900" height="42" rx="0" fill="#181825"/>
  <rect width="900" height="42" rx="10 10 0 0" fill="#181825"/>

  <!-- Traffic lights -->
  <circle cx="18" cy="21" r="6" fill="#ff5f57"/>
  <circle cx="38" cy="21" r="6" fill="#febc2e"/>
  <circle cx="58" cy="21" r="6" fill="#28c840"/>

  <!-- Toolbar title -->
  <text x="90" y="26" fill="#cdd6f4" font-size="13" font-weight="600">📷  AI Image Caption Pro</text>
  <rect x="640" y="10" width="130" height="22" rx="4" fill="#313244"/>
  <text x="705" y="25" fill="#89b4fa" font-size="11" text-anchor="middle">Backend: Ollama</text>
  <text x="796" y="25" fill="#cdd6f4" font-size="16" text-anchor="middle">⊟</text>
  <text x="830" y="25" fill="#cdd6f4" font-size="16" text-anchor="middle">⚙</text>

  <!-- ── LEFT PANEL (drop + controls) ── -->
  <rect x="0" y="42" width="200" height="476" fill="#181825"/>

  <!-- Drop zone -->
  <rect x="10" y="54" width="180" height="130" rx="8" fill="none" stroke="#45475a" stroke-width="2" stroke-dasharray="6 4"/>
  <text x="100" y="103" fill="#585b70" font-size="28" text-anchor="middle">📂</text>
  <text x="100" y="125" fill="#585b70" font-size="12" text-anchor="middle">Drop photos or</text>
  <text x="100" y="140" fill="#585b70" font-size="12" text-anchor="middle">a folder here</text>
  <text x="100" y="158" fill="#45475a" font-size="11" text-anchor="middle">RAW · JPEG · PSD</text>

  <!-- File count -->
  <text x="100" y="204" fill="#89b4fa" font-size="12" text-anchor="middle" font-weight="bold">Wasteland2024</text>
  <text x="100" y="220" fill="#888" font-size="12" text-anchor="middle">47 files ready</text>

  <!-- Force re-process checkbox -->
  <rect x="12" y="228" width="12" height="12" rx="2" fill="none" stroke="#585b70" stroke-width="1.5"/>
  <text x="30" y="239" fill="#888" font-size="11">Re-process already-captioned</text>

  <!-- Buttons -->
  <rect x="12" y="248" width="52" height="28" rx="4" fill="#181825" stroke="#45475a" stroke-width="1"/>
  <text x="38" y="267" fill="#888" font-size="12" text-anchor="middle">← Clear</text>

  <rect x="110" y="244" width="80" height="32" rx="4" fill="#1a472a" stroke="#a6e3a1" stroke-width="1"/>
  <text x="150" y="265" fill="#a6e3a1" font-size="14" font-weight="bold" text-anchor="middle">▶  Start</text>

  <rect x="12" y="284" width="178" height="28" rx="4" fill="#181825" stroke="#f9e2af" stroke-width="1"/>
  <text x="101" y="303" fill="#f9e2af" font-size="12" text-anchor="middle">↩  Undo Last Batch</text>

  <text x="100" y="328" fill="#4caf50" font-size="11" text-anchor="middle">Complete — 45 done, 2 errors</text>

  <!-- ── SPLITTER ── -->
  <rect x="200" y="42" width="3" height="476" fill="#313244"/>

  <!-- ── CENTER PANEL (queue) ── -->
  <rect x="203" y="42" width="474" height="476" fill="#1e1e2e"/>

  <!-- Folder header -->
  <rect x="203" y="42" width="474" height="30" fill="#181825"/>
  <text x="216" y="62" fill="#89b4fa" font-size="13" font-weight="bold">Wasteland2024</text>
  <text x="640" y="62" fill="#585b70" font-size="12" text-anchor="end">45 / 47</text>

  <!-- File rows -->
  <!-- done -->
  <text x="220" y="92" fill="#a6e3a1" font-size="13">✓</text>
  <text x="240" y="92" fill="#cdd6f4" font-size="12">DSC_0038.CR3</text>
  <text x="220" y="112" fill="#a6e3a1" font-size="13">✓</text>
  <text x="240" y="112" fill="#cdd6f4" font-size="12">DSC_0039.CR3</text>
  <text x="220" y="132" fill="#a6e3a1" font-size="13">✓</text>
  <text x="240" y="132" fill="#cdd6f4" font-size="12">DSC_0040.CR3</text>
  <text x="220" y="152" fill="#f38ba8" font-size="13">✗</text>
  <text x="240" y="152" fill="#cdd6f4" font-size="12">DSC_0041.CR3</text>
  <text x="390" y="152" fill="#585b70" font-size="11">preview extraction failed</text>

  <!-- active row highlighted -->
  <rect x="203" y="158" width="474" height="24" fill="#313244"/>
  <text x="220" y="174" fill="#f0a500" font-size="13">⟳</text>
  <text x="240" y="174" fill="#cdd6f4" font-size="12">DSC_0042.CR3</text>
  <text x="390" y="174" fill="#f0a500" font-size="11">Sending to AI…</text>

  <!-- pending -->
  <text x="220" y="196" fill="#45475a" font-size="13">·</text>
  <text x="240" y="196" fill="#585b70" font-size="12">DSC_0043.CR3</text>
  <text x="220" y="216" fill="#45475a" font-size="13">·</text>
  <text x="240" y="216" fill="#585b70" font-size="12">DSC_0044.CR3</text>
  <text x="220" y="236" fill="#45475a" font-size="13">·</text>
  <text x="240" y="236" fill="#585b70" font-size="12">DSC_0045.CR3</text>

  <!-- Caption preview pane -->
  <rect x="203" y="390" width="474" height="128" fill="#181825"/>
  <line x1="203" y1="390" x2="677" y2="390" stroke="#313244" stroke-width="1"/>
  <text x="216" y="410" fill="#888" font-size="11">DSC_0040.CR3</text>
  <text x="216" y="430" fill="#cdd6f4" font-size="12">Two surfers in wetsuits carry their boards up a weathered</text>
  <text x="216" y="447" fill="#cdd6f4" font-size="12">concrete ramp from the ocean, silhouetted against a grey</text>
  <text x="216" y="464" fill="#cdd6f4" font-size="12">overcast sky. The water behind them is choppy.</text>
  <text x="216" y="484" fill="#888" font-size="11" font-style="italic">surfing · ocean · wetsuit · overcast · silhouette · beach · sport</text>
  <text x="216" y="504" fill="#585b70" font-size="10">58 char caption · 7 keywords  [ai]</text>

  <!-- ── SPLITTER ── -->
  <rect x="677" y="42" width="3" height="476" fill="#313244"/>

  <!-- ── RIGHT PANEL (quick settings) ── -->
  <rect x="680" y="42" width="220" height="476" fill="#181825"/>
  <text x="690" y="68" fill="#888" font-size="11" font-weight="bold" letter-spacing="1">QUICK SETTINGS</text>

  <!-- Backend -->
  <text x="690" y="92" fill="#888" font-size="11">Backend</text>
  <rect x="690" y="97" width="200" height="24" rx="4" fill="#313244" stroke="#45475a" stroke-width="1"/>
  <text x="703" y="113" fill="#cdd6f4" font-size="12">Ollama</text>
  <text x="880" y="113" fill="#585b70" font-size="10" text-anchor="end">▾</text>

  <!-- Model -->
  <text x="690" y="138" fill="#888" font-size="11">Model</text>
  <rect x="690" y="143" width="174" height="24" rx="4" fill="#313244" stroke="#45475a" stroke-width="1"/>
  <text x="703" y="159" fill="#cdd6f4" font-size="12">gemma3:12b</text>
  <text x="858" y="159" fill="#585b70" font-size="10" text-anchor="end">▾</text>
  <rect x="868" y="143" width="22" height="24" rx="4" fill="#313244" stroke="#45475a" stroke-width="1"/>
  <text x="879" y="159" fill="#888" font-size="12" text-anchor="middle">⟳</text>

  <!-- Keywords slider -->
  <text x="690" y="185" fill="#888" font-size="11">Keywords</text>
  <text x="880" y="185" fill="#89b4fa" font-size="11" text-anchor="end">Standard</text>
  <rect x="690" y="190" width="200" height="4" rx="2" fill="#313244"/>
  <rect x="690" y="190" width="100" height="4" rx="2" fill="#89b4fa"/>
  <circle cx="790" cy="192" r="7" fill="#89b4fa"/>

  <!-- Description slider -->
  <text x="690" y="218" fill="#888" font-size="11">Description</text>
  <text x="880" y="218" fill="#89b4fa" font-size="11" text-anchor="end">Detailed</text>
  <rect x="690" y="223" width="200" height="4" rx="2" fill="#313244"/>
  <rect x="690" y="223" width="140" height="4" rx="2" fill="#89b4fa"/>
  <circle cx="830" cy="225" r="7" fill="#89b4fa"/>

  <!-- Divider -->
  <line x1="690" y1="245" x2="880" y2="245" stroke="#313244" stroke-width="1"/>

  <!-- Context hint -->
  <text x="690" y="264" fill="#888" font-size="11">Context hint</text>
  <rect x="690" y="269" width="200" height="60" rx="4" fill="#313244" stroke="#45475a" stroke-width="1"/>
  <text x="700" y="285" fill="#585b70" font-size="11">Post-apocalyptic festival,</text>
  <text x="700" y="300" fill="#585b70" font-size="11">California desert. Mad Max</text>
  <text x="700" y="315" fill="#585b70" font-size="11">vehicles, costumed performers…</text>

  <!-- Seeds -->
  <text x="690" y="352" fill="#888" font-size="11">Seed keywords</text>
  <rect x="690" y="357" width="200" height="24" rx="4" fill="#313244" stroke="#45475a" stroke-width="1"/>
  <text x="700" y="373" fill="#585b70" font-size="11">Wasteland Weekend, diesel punk</text>

  <!-- Checkboxes -->
  <rect x="690" y="394" width="12" height="12" rx="2" fill="#89b4fa"/>
  <text x="709" y="405" fill="#888" font-size="11">Recursive scan</text>
  <rect x="690" y="412" width="12" height="12" rx="2" fill="none" stroke="#585b70" stroke-width="1.5"/>
  <text x="709" y="423" fill="#888" font-size="11">Skip already done</text>

  <!-- ── STATUS BAR ── -->
  <rect x="0" y="518" width="900" height="42" fill="#11111b"/>
  <line x1="0" y1="518" x2="900" y2="518" stroke="#313244" stroke-width="1"/>

  <!-- Progress bar -->
  <rect x="12" y="530" width="340" height="10" rx="5" fill="#313244"/>
  <rect x="12" y="530" width="307" height="10" rx="5" fill="#89b4fa"/>
  <text x="365" y="540" fill="#888" font-size="11">45 / 47</text>

  <!-- Buttons -->
  <rect x="430" y="525" width="80" height="22" rx="4" fill="#313244" stroke="#45475a" stroke-width="1"/>
  <text x="470" y="540" fill="#cdd6f4" font-size="11" text-anchor="middle">⏸ Pause</text>
  <rect x="518" y="525" width="64" height="22" rx="4" fill="#313244" stroke="#f38ba8" stroke-width="1"/>
  <text x="550" y="540" fill="#f38ba8" font-size="11" text-anchor="middle">■ Stop</text>

  <!-- Status msg -->
  <text x="600" y="540" fill="#f0a500" font-size="11">[3/4] Sending to AI — DSC_0042.CR3</text>

  <!-- Log btn -->
  <rect x="858" y="524" width="30" height="24" rx="4" fill="#313244" stroke="#45475a" stroke-width="1"/>
  <text x="873" y="540" fill="#cdd6f4" font-size="14" text-anchor="middle">📋</text>
</svg>
